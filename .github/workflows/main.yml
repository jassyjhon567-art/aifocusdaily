name: Auto News Rewriting & Indexing (Manab Bot)

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর স্বয়ংক্রিয়ভাবে চলবে
  workflow_dispatch: # ম্যানুয়ালি যেকোনো সময় চালানোর জন্য

permissions:
  contents: write # গিটহাবে ফাইল পুশ করার অনুমতি

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main # Detached HEAD সমস্যা সমাধান করার জন্য

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser google-auth

    - name: Run AI Scraping and Indexing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GCLOUD_KEY: ${{ secrets.GCLOUD_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # ফাইল ও ফোল্ডারগুলো তৈরি হয়েছে কিনা তা পরীক্ষা করে সেফলি অ্যাড করা হচ্ছে
        if [ -f news.json ]; then git add news.json; fi
        if [ -d posts ]; then git add posts/; fi
        if [ -d images ]; then git add images/; fi
        
        # কোনো পরিবর্তন থাকলেই কেবল সেভ হবে, অন্যথায় ক্র্যাশ ছাড়াই সফলভাবে শেষ হবে
        git diff-index --quiet HEAD || git commit -m "Manab AI: Generated New SEO Posts and AI Images"
        git push origin main
