name: Manab AI Content Engine

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: manab-ai-content-engine
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser google-auth

      - name: Run Manab AI content engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCLOUD_KEY: ${{ secrets.GCLOUD_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          python main.py

      - name: Commit and push generated content
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Manab AI Bot"
          git add news.json posts/ images/
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore: automated content update [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

