<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manab AI - Daily AI Launches</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --card-bg: #151824;
            --accent-color: #00f2fe;
            --glow-color: rgba(0, 242, 254, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(180deg, rgba(21, 24, 36, 0.8) 0%, rgba(13, 14, 21, 0) 100%);
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--glow-color);
            border-color: var(--accent-color);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .badge {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            align-self: flex-start;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .card-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-title a:hover {
            color: var(--accent-color);
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .ad-container {
            width: 100%;
            max-width: 728px;
            margin: 2rem auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Manab AI</h1>
        <p class="subtitle">নতুন এআই রিলিজ এবং আপডেটগুলোর অটোমেটেড বাংলা প্ল্যাটফর্ম।</p>
    </header>

    <!-- Adsterra Top Advertisement Banner -->
    <div class="ad-container">
        <!-- Replace this with your Adsterra Banner Code -->
        <p style="color: #475569; margin: 0; font-size: 0.8rem;">Ad Space</p>
    </div>

    <div class="container" id="news-container">
        <div class="status-msg">সর্বশেষ আপডেটগুলো লোড করা হচ্ছে...</div>
    </div>

    <!-- Adsterra Bottom Advertisement Banner -->
    <div class="ad-container">
        <!-- Replace this with your Adsterra Banner Code -->
        <p style="color: #475569; margin: 0; font-size: 0.8rem;">Ad Space</p>
    </div>

    <footer>
        <p>&copy; 2026 Manab AI. Powered by GitHub Actions.</p>
    </footer>

    <script>
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                const response = await fetch(`news.json?t=${new Date().getTime()}`);
                if (!response.ok) {
                    throw new Error('Database loading failed.');
                }
                const news = await response.json();
                
                if (news.length === 0) {
                    container.innerHTML = '<div class="status-msg">আপাতত নতুন কোনো আপডেট পাওয়া যায়নি।</div>';
                    return;
                }

                container.innerHTML = '';

                news.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" onerror="this.src='https://images.unsplash.com/photo-1677442136019-21780efad99a?auto=format&fit=crop&w=800&q=80'">
                        <div class="card-content">
                            <span class="badge">${item.source}</span>
                            <h2 class="card-title">
                                <a href="${item.link}">${item.title}</a>
                            </h2>
                            <p class="card-desc">${item.description || 'বিস্তারিত পড়তে লিঙ্কে ক্লিক করুন।'}</p>
                            <div class="card-footer">
                                <span>${item.published}</span>
                                <span>পড়ুন &rarr;</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="status-msg">দুঃখিত, খবর লোড করতে সমস্যা হচ্ছে।</div>';
            }
        }

        fetchNews();
    </script>
</body>
</html>
