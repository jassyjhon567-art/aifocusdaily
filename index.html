<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manab AI — Bilingual Knowledge & News Platform</title>
<meta name="description" content="Manab AI is an autonomous bilingual (English/Bengali) knowledge and news platform covering AI, tech, science, health, business and more.">
<link rel="preconnect" href="https://images.unsplash.com">
<style>
  :root {
    --bg: #0b0e14;
    --bg-alt: #0f1320;
    --card: #131722;
    --card-hover: #171c2c;
    --border: #232838;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --accent-2: #00d4ff;
    --text: #e6e6f0;
    --muted: #9aa0b4;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: radial-gradient(circle at 20% 0%, #171b2e 0%, var(--bg) 45%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  @media (min-width: 768px) {
    .wrap { padding: 2.5rem; }
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .brand .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 14px 4px var(--accent-glow);
  }
  .brand span.gradient {
    background: linear-gradient(135deg, var(--accent-glow), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .lang-switch {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
  }
  .lang-switch button {
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s ease;
  }
  .lang-switch button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 0 16px rgba(108, 92, 231, 0.5);
  }

  .hero {
    text-align: center;
    padding: 2rem 1rem 3rem;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    margin-bottom: 0.8rem;
    letter-spacing: -0.02em;
  }
  .hero p {
    color: var(--muted);
    max-width: 620px;
    margin: 0 auto;
    font-size: 1.05rem;
  }

  .niche-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin: 2rem 0;
  }
  .niche-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem 1rem;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .niche-chip:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .niche-chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border-color: transparent;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  @media (min-width: 640px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(108, 92, 231, 0.25);
    background: var(--card-hover);
  }
  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #1a1f2e;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-niche {
    position: absolute;
    top: 0.7rem;
    left: 0.7rem;
    background: rgba(11, 14, 20, 0.75);
    backdrop-filter: blur(6px);
    color: var(--accent-glow);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    border: 1px solid rgba(162, 155, 254, 0.35);
  }
  .card-body {
    padding: 1.1rem 1.2rem 1.3rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }
  .card-summary {
    color: var(--muted);
    font-size: 0.9rem;
    flex: 1;
    margin-bottom: 0.8rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 0.7rem;
  }
  .card-meta .readmore {
    color: var(--accent-glow);
    font-weight: 700;
  }

  .empty-state, .loading-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 3rem 1rem 1.5rem;
  }
  footer .gradient {
    background: linear-gradient(135deg, var(--accent-glow), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }

  [dir="rtl"] { unicode-bidi: normal; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="dot"></div>
      <span>Manab</span><span class="gradient">&nbsp;AI</span>
    </div>
    <div class="lang-switch" role="group" aria-label="Language switch">
      <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
      <button id="btn-bn" onclick="setLang('bn')">বাংলা</button>
    </div>
  </header>

  <section class="hero">
    <h1 id="hero-title">Knowledge, Curated &amp; Explained</h1>
    <p id="hero-sub">Fresh, AI-expanded stories across AI, tech, science, health, business, and more — in English and Bengali.</p>
  </section>

  <div class="niche-filter" id="niche-filter"></div>

  <main>
    <div id="loading" class="loading-state">Loading latest stories…</div>
    <div id="grid" class="grid" style="display:none;"></div>
    <div id="empty" class="empty-state" style="display:none;">No articles found for this filter yet. Check back soon.</div>
  </main>

  <footer>
    &copy; <span id="year"></span> <span class="gradient">Manab AI</span> — Autonomous Bilingual Knowledge Platform
  </footer>
</div>

<script>
(function () {
  var STRINGS = {
    en: {
      heroTitle: "Knowledge, Curated & Explained",
      heroSub: "Fresh, AI-expanded stories across AI, tech, science, health, business, and more — in English and Bengali.",
      readMore: "Read more →",
      all: "All",
      empty: "No articles found for this filter yet. Check back soon.",
      loading: "Loading latest stories…"
    },
    bn: {
      heroTitle: "জ্ঞান, সংকলিত ও ব্যাখ্যাত",
      heroSub: "এআই, প্রযুক্তি, বিজ্ঞান, স্বাস্থ্য, ব্যবসাসহ নানা বিষয়ে তাজা, বিস্তারিত সংবাদ — ইংরেজি ও বাংলায়।",
      readMore: "আরও পড়ুন →",
      all: "সব",
      empty: "এই বিভাগে এখনো কোনো লেখা পাওয়া যায়নি। শীঘ্রই আবার দেখুন।",
      loading: "সর্বশেষ খবর লোড হচ্ছে…"
    }
  };

  var state = {
    lang: "en",
    niche: "all",
    news: []
  };

  function el(id) { return document.getElementById(id); }

  function setLang(lang) {
    state.lang = lang;
    el("btn-en").classList.toggle("active", lang === "en");
    el("btn-bn").classList.toggle("active", lang === "bn");
    document.documentElement.setAttribute("lang", lang);
    render();
  }
  window.setLang = setLang;

  function setNiche(niche) {
    state.niche = niche;
    render();
  }
  window.setNiche = setNiche;

  function fallbackImgFor(title) {
    var map = {
      train: "https://images.unsplash.com/photo-1474487548417-781cb71495f3?w=1200&h=675&fit=crop",
      cloud: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&h=675&fit=crop",
      server: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1200&h=675&fit=crop",
      ai: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&h=675&fit=crop",
      security: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&h=675&fit=crop",
      health: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=1200&h=675&fit=crop",
      business: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200&h=675&fit=crop",
      science: "https://images.unsplash.com/photo-1507413245164-6160d8298b31?w=1200&h=675&fit=crop"
    };
    var t = (title || "").toLowerCase();
    for (var k in map) {
      if (t.indexOf(k) !== -1) return map[k];
    }
    return "https://images.unsplash.com/photo-1495020689067-958852a7765e?w=1200&h=675&fit=crop";
  }

  function buildNicheFilter() {
    var niches = ["all"];
    state.news.forEach(function (item) {
      if (item.niche && niches.indexOf(item.niche) === -1) niches.push(item.niche);
    });
    var container = el("niche-filter");
    container.innerHTML = "";
    niches.forEach(function (n) {
      var chip = document.createElement("button");
      chip.className = "niche-chip" + (state.niche === n ? " active" : "");
      chip.textContent = n === "all" ? STRINGS[state.lang].all : n;
      chip.onclick = function () { setNiche(n); };
      container.appendChild(chip);
    });
  }

  function render() {
    el("hero-title").textContent = STRINGS[state.lang].heroTitle;
    el("hero-sub").textContent = STRINGS[state.lang].heroSub;
    el("empty").textContent = STRINGS[state.lang].empty;
    el("loading").textContent = STRINGS[state.lang].loading;

    buildNicheFilter();

    var filtered = state.news.filter(function (item) {
      return state.niche === "all" || item.niche === state.niche;
    });

    var grid = el("grid");
    grid.innerHTML = "";

    if (!filtered.length) {
      grid.style.display = "none";
      el("empty").style.display = "block";
      return;
    }
    el("empty").style.display = "none";
    grid.style.display = "grid";

    filtered.forEach(function (item) {
      var title = state.lang === "en" ? item.title_en : item.title_bn;
      var summary = state.lang === "en" ? item.summary_en : item.summary_bn;
      var url = state.lang === "en" ? item.url_en : item.url_bn;
      var img = item.image || "";
      var fallback = fallbackImgFor(item.title_en);

      var card = document.createElement("a");
      card.className = "card";
      card.href = url;

      var imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      var badge = document.createElement("span");
      badge.className = "card-niche";
      badge.textContent = item.niche || "";
      imgWrap.appendChild(badge);

      var imgEl = document.createElement("img");
      imgEl.src = img || fallback;
      imgEl.alt = title || "";
      imgEl.loading = "lazy";
      imgEl.referrerPolicy = "no-referrer";
      imgEl.onerror = function () {
        imgEl.onerror = null;
        imgEl.src = fallback;
      };
      imgWrap.appendChild(imgEl);
      card.appendChild(imgWrap);

      var body = document.createElement("div");
      body.className = "card-body";

      var h = document.createElement("div");
      h.className = "card-title";
      h.textContent = title || "";
      body.appendChild(h);

      var p = document.createElement("div");
      p.className = "card-summary";
      p.textContent = summary || "";
      body.appendChild(p);

      var meta = document.createElement("div");
      meta.className = "card-meta";
      var src = document.createElement("span");
      src.textContent = item.source || "";
      var more = document.createElement("span");
      more.className = "readmore";
      more.textContent = STRINGS[state.lang].readMore;
      meta.appendChild(src);
      meta.appendChild(more);
      body.appendChild(meta);

      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  function loadNews() {
    var cacheBuster = "?v=" + Date.now();
    fetch("news.json" + cacheBuster, { cache: "no-store" })
      .then(function (resp) {
        if (!resp.ok) throw new Error("Failed to load news.json");
        return resp.json();
      })
      .then(function (data) {
        state.news = Array.isArray(data) ? data : [];
        el("loading").style.display = "none";
        render();
      })
      .catch(function (err) {
        console.error(err);
        el("loading").textContent = "Could not load stories right now.";
      });
  }

  el("year").textContent = new Date().getFullYear();
  loadNews();
})();
</script>
</body>
</html>
